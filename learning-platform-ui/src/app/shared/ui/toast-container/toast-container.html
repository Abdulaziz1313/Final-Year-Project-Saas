<div class="toasts" *ngIf="toast.items$ | async as items">
  <div
    class="toast"
    *ngFor="let t of items"
    [class.success]="t.type==='success'"
    [class.error]="t.type==='error'"
    [class.info]="t.type==='info'"
  >
    <div class="toast-icon">
      <span *ngIf="t.type==='success'">✓</span>
      <span *ngIf="t.type==='error'">✕</span>
      <span *ngIf="t.type==='info'">i</span>
    </div>
    <div class="toast-msg">{{ t.message }}</div>
    <button class="toast-close" type="button" (click)="close(t.id)" aria-label="Dismiss">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</div>
