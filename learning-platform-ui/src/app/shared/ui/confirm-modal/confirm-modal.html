<div class="backdrop" *ngIf="open" (click)="close(false)">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="title">{{ title }}</div>
    <div class="msg">{{ message }}</div>

    <div class="actions">
      <button class="btn ghost" type="button" (click)="close(false)">{{ cancelText }}</button>
      <button class="btn primary" type="button" (click)="close(true)">{{ confirmText }}</button>
    </div>
  </div>
</div>
