<div class="checkout-page">
  <div class="checkout-card checkout-card--cancel">
    <div class="checkout-icon cancel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6 6 18"/>
        <path d="m6 6 12 12"/>
      </svg>
    </div>

    <div class="eyebrow">Alef checkout</div>
    <h1>Payment cancelled</h1>
    <p>No payment was completed. You can go back and try again whenever you are ready.</p>

    <div class="checkout-actions">
      <button class="btn btn-primary" type="button" (click)="goBackToCourse()">Back to course</button>
      <button class="btn btn-ghost" type="button" (click)="goAcademies()">Browse academies</button>
    </div>
  </div>
</div>
